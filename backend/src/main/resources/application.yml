server:
  port: 8080
  address: 0.0.0.0

spring:
  application:
    name: betmate-backend

  datasource:
    url: jdbc:mysql://localhost:3306/betmate_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:riq21#A20}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
        jdbc:
          time_zone: UTC  # Ensure Hibernate uses UTC for JDBC operations

  # Jackson timezone configuration for JSON serialization
  jackson:
    time-zone: UTC
    date-format: yyyy-MM-dd'T'HH:mm:ss
  
  flyway:
    enabled: false

  # Redis Configuration
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: -1ms

  cache:
    type: redis
    redis:
      time-to-live: 600000  # 10 minutes in milliseconds
      cache-null-values: false

  security:
    jwt:
      secret: ${JWT_SECRET:Y2lyY2xlYmV0X3N1cGVyX3NlY3VyZV9qd3Rfc2VjcmV0X2tleV90aGF0X2lzX2F0X2xlYXN0XzY0X2NoYXJzX2xvbmdfZm9yX2hzNTEyX2FsZ29yaXRobV9zZWN1cml0eQo=}
      expiration: 86400000 # 24 hours in milliseconds
      refresh-expiration: 604800000 # 7 days in milliseconds

# File Upload Configuration
file:
  upload-dir: ${FILE_UPLOAD_DIR:uploads/profile-pictures}

# Bet Scheduling Configuration
bet:
  scheduling:
    # Close expired bets every 15 minutes (900000 ms)
    close-expired-interval-ms: ${BET_CLOSE_INTERVAL:900000}
    # Process resolvable bets every 15 minutes (900000 ms)
    process-resolvable-interval-ms: ${BET_RESOLVE_INTERVAL:900000}
    # Notify approaching betting deadlines every 15 minutes (900000 ms)
    notify-betting-deadline-interval-ms: ${BET_NOTIFY_BETTING_DEADLINE_INTERVAL:900000}
    # Notify approaching resolution deadlines every 15 minutes (900000 ms)
    notify-resolution-deadline-interval-ms: ${BET_NOTIFY_RESOLUTION_DEADLINE_INTERVAL:900000}

logging:
  level:
    com.betmate: DEBUG
    org.springframework.security: DEBUG
    org.springframework.web: DEBUG
    org.springframework.validation: DEBUG
    org.hibernate.validator: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always